<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>视频解析器</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --text: #e0e0e0;
    --text2: #a0a0a0;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --danger: #ef4444;
    --success: #22c55e;
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 24px 0 12px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
  }

  /* Input area */
  .input-group {
    display: flex;
    gap: 10px;
    margin: 16px 0;
  }
  .input-group input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid #333;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus {
    border-color: var(--accent);
  }
  .input-group input::placeholder {
    color: #555;
  }
  .btn-parse {
    flex-shrink: 0;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-parse:active {
    background: var(--accent-hover);
  }

  /* Quick paste hint */
  .quick-hint {
    font-size: 12px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 16px;
  }

  /* Status */
  .status {
    text-align: center;
    padding: 12px;
    font-size: 14px;
    color: var(--text2);
    display: none;
  }
  .status.show { display: block; }
  .status.error { color: var(--danger); }
  .status.success { color: var(--success); }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid #333;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Video player */
  .player-wrapper {
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    margin-top: 16px;
    display: none;
    position: relative;
  }
  .player-wrapper.show { display: block; }
  .player-wrapper video {
    width: 100%;
    display: block;
    max-height: 70vh;
    background: #000;
  }

  /* Actions */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    display: none;
  }
  .actions.show { display: flex; }
  .btn-action {
    flex: 1;
    text-align: center;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid #333;
    border-radius: var(--radius-sm);
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn-action:active { background: #333; }
  .btn-action.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Platform tags */
  .platform-tag {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 8px;
    display: none;
  }
  .platform-tag.show { display: inline-block; }

  /* Info */
  .video-info {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-top: 12px;
    display: none;
  }
  .video-info.show { display: block; }
  .video-info .title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .video-info .meta {
    font-size: 12px;
    color: var(--text2);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Disabled */
  .btn-parse:disabled {
    opacity: 0.5;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>视频解析器</h1>
    <p>粘贴链接，提取纯净视频</p>
  </div>

  <div class="input-group">
    <input type="url" id="urlInput" placeholder="粘贴视频链接…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="btn-parse" id="btnParse" onclick="parseVideo()">解析</button>
  </div>
  <div class="quick-hint">支持：抖音 / 快手 / B站 / 小红书 / YouTube / 微博 / 西瓜 等</div>

  <div class="status" id="status"></div>

  <div class="platform-tag" id="platformTag"></div>
  <div class="player-wrapper" id="playerWrapper">
    <video id="videoPlayer" controls playsinline webkit-playsinline x5-video-player-type="h5" x5-video-orientation="portraint"></video>
  </div>

  <div class="actions" id="actions">
    <a class="btn-action primary" id="btnDownload" target="_blank" rel="noopener">下载视频</a>
    <button class="btn-action" id="btnCopy" onclick="copyLink()">复制链接</button>
  </div>

  <div class="video-info" id="videoInfo">
    <div class="title" id="videoTitle"></div>
    <div class="meta" id="videoMeta"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ 平台识别 ============
function detectPlatform(url) {
  const patterns = [
    { name: '抖音', regex: /douyin\.com|iesdouyin\.com/ },
    { name: '快手', regex: /kuaishou\.com|gifshow\.com|chenzhongtech\.com/ },
    { name: 'B站', regex: /bilibili\.com|b23\.tv/ },
    { name: '小红书', regex: /xiaohongshu\.com|xhslink\.com/ },
    { name: 'YouTube', regex: /youtube\.com|youtu\.be/ },
    { name: '微博', regex: /weibo\.com|weibo\.cn/ },
    { name: '西瓜视频', regex: /ixigua\.com|xigua\.com/ },
    { name: '微视', regex: /weishi\.qq\.com/ },
    { name: '皮皮虾', regex: /pipix\.com/ },
    { name: '最右', regex: /zuiyou\.com/ },
    { name: '火山', regex: /huoshan\.com/ },
    { name: 'TikTok', regex: /tiktok\.com/ },
    { name: 'Instagram', regex: /instagram\.com/ },
    { name: 'Twitter/X', regex: /twitter\.com|x\.com/ },
  ];
  for (let p of patterns) {
    if (p.regex.test(url)) return p.name;
  }
  return '未知平台';
}

// ============ 从响应中提取视频URL（兼容多种格式） ============
function extractVideoUrl(data) {
  // bugpk 聚合: data.url / data.video_url / data.video
  if (data.url && /^https?:\/\//.test(data.url)) return data.url;
  if (data.video_url && /^https?:\/\//.test(data.video_url)) return data.video_url;
  if (data.video && typeof data.video === 'string' && /^https?:\/\//.test(data.video)) return data.video;
  // 嵌套 data.data
  if (data.data) {
    if (typeof data.data === 'string' && /^https?:\/\//.test(data.data)) return data.data;
    if (typeof data.data === 'object') {
      if (data.data.url && /^https?:\/\//.test(data.data.url)) return data.data.url;
      if (data.data.video_url && /^https?:\/\//.test(data.data.video_url)) return data.data.video_url;
      if (data.data.video && typeof data.data.video === 'string') return data.data.video;
      // B站 durl
      if (data.data.durl && data.data.durl.length > 0 && data.data.durl[0].url) return data.data.durl[0].url;
    }
  }
  return null;
}

function extractTitle(data) {
  if (data.title) return data.title;
  if (data.data && data.data.title) return data.data.title;
  return '';
}

// ============ 解析核心 ============
async function parseVideo() {
  const input = document.getElementById('urlInput');
  const url = input.value.trim();
  const btn = document.getElementById('btnParse');

  if (!url) {
    showStatus('请输入视频链接', 'error');
    return;
  }

  resetUI();
  btn.disabled = true;
  showStatus('<span class="spinner"></span>解析中…', '');

  const platform = detectPlatform(url);
  document.getElementById('platformTag').textContent = platform;
  document.getElementById('platformTag').classList.add('show');

  try {
    let videoUrl = null;
    let title = '';

    // 策略1: bugpk 聚合接口（支持 20+ 平台）
    videoUrl = await tryBugpk(url);
    if (!videoUrl) {
      // 策略2: 平台专用解析
      videoUrl = await tryPlatformParsers(url, platform);
    }
    if (!videoUrl) {
      // 策略3: B站官方API
      videoUrl = await parseBilibili(url);
    }

    if (videoUrl) {
      onSuccess(videoUrl, title, platform);
    } else {
      const embedUrl = getEmbedUrl(url, platform);
      if (embedUrl) {
        onSuccess(embedUrl, title, platform);
      } else {
        showStatus('未能解析到视频，请检查链接是否正确', 'error');
      }
    }
  } catch (e) {
    console.error(e);
    showStatus('解析失败：' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// --- bugpk 聚合接口（主力） ---
async function tryBugpk(url) {
  try {
    const r = await fetchWithTimeout('https://api.bugpk.com/api/short_videos?url=' + encodeURIComponent(url), 10000);
    const d = await r.json();
    if (d.code === 200) {
      return extractVideoUrl(d);
    }
  } catch(e) {}
  return null;
}

// --- 平台专用备用解析 ---
async function tryPlatformParsers(url, platform) {
  switch (platform) {
    case '快手':
      return await parseKuaishou(url);
    case '抖音':
      return await parseDouyin(url);
    case '小红书':
      return await parseXiaohongshu(url);
    case 'YouTube':
      return await parseYoutube(url);
    case '西瓜视频':
      return await parseXigua(url);
    default:
      return null;
  }
}

// --- 快手备用 ---
async function parseKuaishou(url) {
  const apis = [
    'https://api.dlck.cn/api/ksvideo.php?url=',
    'https://api.bugpk.com/api/ks?url=',
    'https://api.bugpk.com/api/ks_jh?url=',
  ];
  for (let base of apis) {
    try {
      const r = await fetchWithTimeout(base + encodeURIComponent(url), 10000);
      const d = await r.json();
      const u = extractVideoUrl(d);
      if (u) return u;
    } catch(e) {}
  }
  return null;
}

// --- 抖音备用 ---
async function parseDouyin(url) {
  let finalUrl = url;
  if (/v\.douyin\.com/.test(url)) {
    try {
      const resp = await fetch(url, { method: 'HEAD', redirect: 'follow' });
      finalUrl = resp.url || url;
    } catch(e) {}
  }
  const apis = [
    'https://api.bugpk.com/api/dy?url=',
    'https://api.dlck.cn/api/dyvideo.php?url=',
  ];
  for (let base of apis) {
    try {
      const r = await fetchWithTimeout(base + encodeURIComponent(finalUrl), 10000);
      const d = await r.json();
      const u = extractVideoUrl(d);
      if (u) return u;
    } catch(e) {}
  }
  return null;
}

// --- 小红书备用 ---
async function parseXiaohongshu(url) {
  try {
    const r = await fetchWithTimeout('https://api.bugpk.com/api/xhs?url=' + encodeURIComponent(url), 10000);
    const d = await r.json();
    return extractVideoUrl(d);
  } catch(e) {}
  return null;
}

// --- YouTube ---
function extractYoutubeId(url) {
  const patterns = [
    /(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,
    /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
  ];
  for (let p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

async function parseYoutube(url) {
  try {
    const vid = extractYoutubeId(url);
    if (vid) {
      const r = await fetchWithTimeout('https://inv.nadeko.net/api/v1/videos/' + vid, 10000);
      const d = await r.json();
      if (d.formatStreams) {
        const best = d.formatStreams.filter(f => f.container === 'webm' || f.container === 'mp4').pop();
        if (best && best.url) return best.url;
      }
    }
  } catch(e) {}
  return null;
}

// --- 西瓜视频 ---
async function parseXigua(url) {
  try {
    const r = await fetchWithTimeout('https://api.bugpk.com/api/xigua?url=' + encodeURIComponent(url), 10000);
    const d = await r.json();
    return extractVideoUrl(d);
  } catch(e) {}
  return null;
}

// --- B站官方API ---
async function parseBilibili(url) {
  let bvid = null, avid = null;
  const bvMatch = url.match(/BV[a-zA-Z0-9]{10}/);
  const avMatch = url.match(/av(\d+)/i);
  if (bvMatch) bvid = bvMatch[0];
  else if (avMatch) avid = avMatch[1];
  if (!bvid && !avid) return null;

  try {
    const apiUrl = bvid
      ? 'https://api.bilibili.com/x/web-interface/view?bvid=' + bvid
      : 'https://api.bilibili.com/x/web-interface/view?aid=' + avid;
    const r = await fetchWithTimeout(apiUrl, 8000);
    const d = await r.json();
    if (d.code === 0 && d.data) {
      const cid = d.data.cid || (d.data.pages && d.data.pages[0] && d.data.pages[0].cid);
      if (cid) {
        const playApi = bvid
          ? 'https://api.bilibili.com/x/player/playurl?bvid=' + bvid + '&cid=' + cid + '&qn=80&fnval=1&fourk=1'
          : 'https://api.bilibili.com/x/player/playurl?aid=' + avid + '&cid=' + cid + '&qn=80&fnval=1&fourk=1';
        const r2 = await fetchWithTimeout(playApi, 8000);
        const d2 = await r2.json();
        const u = extractVideoUrl(d2);
        if (u) return u;
      }
    }
  } catch(e) {}
  return null;
}

// --- iframe 嵌入（兜底） ---
function getEmbedUrl(url, platform) {
  switch (platform) {
    case 'B站': {
      const bvMatch = url.match(/BV[a-zA-Z0-9]{10}/);
      if (bvMatch) return 'https://player.bilibili.com/player.html?bvid=' + bvMatch[0] + '&autoplay=0';
      const avMatch = url.match(/av(\d+)/i);
      if (avMatch) return 'https://player.bilibili.com/player.html?aid=' + avMatch[1] + '&autoplay=0';
      return null;
    }
    case 'YouTube': {
      const vid = extractYoutubeId(url);
      if (vid) return 'https://www.youtube.com/embed/' + vid;
      return null;
    }
    default:
      return null;
  }
}

// ============ 工具函数 ============
function fetchWithTimeout(url, timeout) {
  return new Promise((resolve, reject) => {
    const controller = new AbortController();
    const timer = setTimeout(() => { controller.abort(); reject(new Error('请求超时')); }, timeout);
    fetch(url, { signal: controller.signal })
      .then(r => { clearTimeout(timer); resolve(r); })
      .catch(e => { clearTimeout(timer); reject(e); });
  });
}

// ============ UI 逻辑 ============
function resetUI() {
  document.getElementById('playerWrapper').classList.remove('show');
  document.getElementById('actions').classList.remove('show');
  document.getElementById('videoInfo').classList.remove('show');
  document.getElementById('platformTag').classList.remove('show');
  const player = document.getElementById('videoPlayer');
  player.src = '';
  player.style.display = '';
  document.getElementById('playerWrapper').innerHTML = '<video id="videoPlayer" controls playsinline webkit-playsinline x5-video-player-type="h5" x5-video-orientation="portraint"></video>';
  document.getElementById('btnDownload').href = '#';
  document.getElementById('btnDownload').style.display = '';
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = 'status show';
  if (type) el.classList.add(type);
}

function onSuccess(videoUrl, title, platform) {
  const isEmbed = videoUrl.includes('player.bilibili.com') || videoUrl.includes('youtube.com/embed');

  if (isEmbed) {
    const wrapper = document.getElementById('playerWrapper');
    wrapper.innerHTML = '<iframe src="' + videoUrl + '" style="width:100%;height:50vh;border:none;border-radius:14px;" allow="autoplay;fullscreen" allowfullscreen></iframe>';
    wrapper.classList.add('show');
    document.getElementById('btnDownload').style.display = 'none';
  } else {
    const wrapper = document.getElementById('playerWrapper');
    wrapper.innerHTML = '<video id="videoPlayer" controls playsinline webkit-playsinline x5-video-player-type="h5" x5-video-orientation="portraint" src="' + videoUrl + '"></video>';
    wrapper.classList.add('show');
    document.getElementById('btnDownload').href = videoUrl;
  }

  document.getElementById('btnCopy').style.display = 'block';
  document.getElementById('actions').classList.add('show');

  if (title) {
    document.getElementById('videoTitle').textContent = title;
    document.getElementById('videoInfo').classList.add('show');
  }

  showStatus('解析成功', 'success');
  setTimeout(function() { document.getElementById('status').classList.remove('show'); }, 2000);
}

function copyLink() {
  const player = document.getElementById('videoPlayer');
  const url = (player && player.src) || document.getElementById('btnDownload').href;
  if (!url || url === '#' || url === window.location.href) return;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function() { showToast('链接已复制'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('链接已复制');
  }
}

function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 1800);
}

// ============ 事件监听 ============
document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); parseVideo(); }
});

document.getElementById('btnDownload').addEventListener('click', function(e) {
  var url = this.href;
  if (!url || url === '#') { e.preventDefault(); return; }
  var ext = url.match(/\.(mp4|webm|mov|mkv|flv)(\?|$)/i);
  this.download = 'video.' + (ext ? ext[1] : 'mp4');
});
</script>
</body>
</html>
