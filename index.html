<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>视频解析器</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --text: #e0e0e0;
    --text2: #a0a0a0;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --danger: #ef4444;
    --success: #22c55e;
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 24px 0 12px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
  }

  /* Input area */
  .input-group {
    display: flex;
    gap: 10px;
    margin: 16px 0;
  }
  .input-group input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid #333;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus {
    border-color: var(--accent);
  }
  .input-group input::placeholder {
    color: #555;
  }
  .btn-parse {
    flex-shrink: 0;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-parse:active {
    background: var(--accent-hover);
  }

  /* Quick paste hint */
  .quick-hint {
    font-size: 12px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 16px;
  }

  /* Status */
  .status {
    text-align: center;
    padding: 12px;
    font-size: 14px;
    color: var(--text2);
    display: none;
  }
  .status.show { display: block; }
  .status.error { color: var(--danger); }
  .status.success { color: var(--success); }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid #333;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Video player */
  .player-wrapper {
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    margin-top: 16px;
    display: none;
    position: relative;
  }
  .player-wrapper.show { display: block; }
  .player-wrapper video {
    width: 100%;
    display: block;
    max-height: 70vh;
    background: #000;
  }

  /* Actions */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    display: none;
  }
  .actions.show { display: flex; }
  .btn-action {
    flex: 1;
    text-align: center;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid #333;
    border-radius: var(--radius-sm);
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn-action:active { background: #333; }
  .btn-action.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Platform tags */
  .platform-tag {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 8px;
    display: none;
  }
  .platform-tag.show { display: inline-block; }

  /* Info */
  .video-info {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-top: 12px;
    display: none;
  }
  .video-info.show { display: block; }
  .video-info .title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .video-info .meta {
    font-size: 12px;
    color: var(--text2);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Disabled */
  .btn-parse:disabled {
    opacity: 0.5;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>视频解析器</h1>
    <p>粘贴链接，提取纯净视频</p>
  </div>

  <div class="input-group">
    <input type="url" id="urlInput" placeholder="粘贴视频链接…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="btn-parse" id="btnParse" onclick="parseVideo()">解析</button>
  </div>
  <div class="quick-hint">支持：抖音 / 快手 / B站 / 小红书 / YouTube / 微博 / 西瓜 等</div>

  <div class="status" id="status"></div>

  <div class="platform-tag" id="platformTag"></div>
  <div class="player-wrapper" id="playerWrapper">
    <video id="videoPlayer" controls playsinline webkit-playsinline x5-video-player-type="h5" x5-video-orientation="portraint"></video>
  </div>

  <div class="actions" id="actions">
    <a class="btn-action primary" id="btnDownload" target="_blank" rel="noopener">下载视频</a>
    <button class="btn-action" id="btnCopy" onclick="copyLink()">复制链接</button>
  </div>

  <div class="video-info" id="videoInfo">
    <div class="title" id="videoTitle"></div>
    <div class="meta" id="videoMeta"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ 平台识别 ============
function detectPlatform(url) {
  const patterns = [
    { name: '抖音', regex: /douyin\.com|iesdouyin\.com/ },
    { name: '快手', regex: /kuaishou\.com|gifshow\.com|chenzhongtech\.com/ },
    { name: 'B站', regex: /bilibili\.com|b23\.tv/ },
    { name: '小红书', regex: /xiaohongshu\.com|xhslink\.com/ },
    { name: 'YouTube', regex: /youtube\.com|youtu\.be/ },
    { name: '微博', regex: /weibo\.com|weibo\.cn/ },
    { name: '西瓜视频', regex: /ixigua\.com|xigua\.com/ },
    { name: '微视', regex: /weishi\.qq\.com/ },
    { name: '皮皮虾', regex: /pipix\.com/ },
    { name: '最右', regex: /zuiyou\.com/ },
    { name: '火山', regex: /huoshan\.com/ },
    { name: 'TikTok', regex: /tiktok\.com/ },
    { name: 'Instagram', regex: /instagram\.com/ },
    { name: 'Twitter/X', regex: /twitter\.com|x\.com/ },
  ];
  for (let p of patterns) {
    if (p.regex.test(url)) return p.name;
  }
  return '未知平台';
}

// ============ 解析核心 ============
async function parseVideo() {
  const input = document.getElementById('urlInput');
  const url = input.value.trim();
  const statusEl = document.getElementById('status');
  const btn = document.getElementById('btnParse');

  if (!url) {
    showStatus('请输入视频链接', 'error');
    return;
  }

  // Reset UI
  resetUI();
  btn.disabled = true;
  showStatus('<span class="spinner"></span>解析中…', '');

  const platform = detectPlatform(url);
  document.getElementById('platformTag').textContent = platform;
  document.getElementById('platformTag').classList.add('show');

  try {
    let videoUrl = null;
    let title = '';
    let meta = '';

    // 策略1: 尝试各平台专用解析
    videoUrl = await tryPlatformParsers(url, platform);

    // 策略2: 通用 oembed
    if (!videoUrl) {
      const oembed = await tryOEmbed(url);
      if (oembed) {
        videoUrl = oembed.video_url || oembed.url || null;
        title = oembed.title || '';
      }
    }

    // 策略3: 尝试通用第三方解析
    if (!videoUrl) {
      videoUrl = await tryGenericParser(url);
    }

    if (videoUrl) {
      onSuccess(videoUrl, title, meta, platform);
    } else {
      // 策略4: 使用 iframe 嵌入（B站等）
      const embedUrl = getEmbedUrl(url, platform);
      if (embedUrl) {
        onSuccess(embedUrl, title, meta, platform);
      } else {
        showStatus('未能解析到视频，请检查链接是否正确', 'error');
      }
    }
  } catch (e) {
    console.error(e);
    showStatus('解析失败：' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ============ 平台专用解析 ============
async function tryPlatformParsers(url, platform) {
  switch (platform) {
    case '抖音':
      return await parseDouyin(url);
    case '快手':
      return await parseKuaishou(url);
    case 'B站':
      return await parseBilibili(url);
    case '小红书':
      return await parseXiaohongshu(url);
    case 'YouTube':
      return await parseYoutube(url);
    case '西瓜视频':
      return await parseXigua(url);
    default:
      return null;
  }
}

// --- 抖音 ---
async function parseDouyin(url) {
  // 缩短链接先展开
  let finalUrl = url;
  if (/v\.douyin\.com/.test(url)) {
    try {
      const resp = await fetch(url, { method: 'HEAD', redirect: 'follow' });
      finalUrl = resp.url || url;
    } catch(e) {}
  }

  // 尝试多个第三方解析接口
  const apis = [
    async () => {
      const r = await fetchWithTimeout('https://api.qqsuu.cn/api/dm-music/video?url=' + encodeURIComponent(finalUrl), 8000);
      const d = await r.json();
      return (d.code === 200 && d.data && d.data.url) ? d.data.url : null;
    },
    async () => {
      const r = await fetchWithTimeout('https://tenapi.cn/v2/video?url=' + encodeURIComponent(finalUrl), 8000);
      const d = await r.json();
      return (d.code === 200 && d.data && d.data.url) ? d.data.url : null;
    },
    async () => {
      const r = await fetchWithTimeout('https://api.pearktrue.cn/api/video/douyin/?url=' + encodeURIComponent(finalUrl), 8000);
      const d = await r.json();
      return (d.code === 200 && d.url) ? d.url : (d.data && d.data.url ? d.data.url : null);
    },
  ];

  for (let fn of apis) {
    try {
      const result = await fn();
      if (result) return result;
    } catch(e) {}
  }
  return null;
}

// --- 快手 ---
async function parseKuaishou(url) {
  const apis = [
    async () => {
      const r = await fetchWithTimeout('https://api.qqsuu.cn/api/dm-music/video?url=' + encodeURIComponent(url), 8000);
      const d = await r.json();
      return (d.code === 200 && d.data && d.data.url) ? d.data.url : null;
    },
    async () => {
      const r = await fetchWithTimeout('https://tenapi.cn/v2/video?url=' + encodeURIComponent(url), 8000);
      const d = await r.json();
      return (d.code === 200 && d.data && d.data.url) ? d.data.url : null;
    },
  ];

  for (let fn of apis) {
    try {
      const result = await fn();
      if (result) return result;
    } catch(e) {}
  }
  return null;
}

// --- B站 ---
async function parseBilibili(url) {
  // 提取 BV 号或 AV 号
  let bvid = null, avid = null;
  const bvMatch = url.match(/BV[a-zA-Z0-9]{10}/);
  const avMatch = url.match(/av(\d+)/i);
  if (bvMatch) bvid = bvMatch[0];
  else if (avMatch) avid = avMatch[1];

  if (!bvid && !avid) return null;

  try {
    let apiUrl;
    if (bvid) {
      apiUrl = 'https://api.bilibili.com/x/web-interface/view?bvid=' + bvid;
    } else {
      apiUrl = 'https://api.bilibili.com/x/web-interface/view?aid=' + avid;
    }

    // B站 API 可能有跨域限制，通过 JSONP 或直接试
    const r = await fetchWithTimeout(apiUrl, 8000);
    const d = await r.json();
    if (d.code === 0 && d.data) {
      const cid = d.data.cid || (d.data.pages && d.data.pages[0] && d.data.pages[0].cid);
      if (cid) {
        const playApi = bvid
          ? `https://api.bilibili.com/x/player/playurl?bvid=${bvid}&cid=${cid}&qn=80&fnval=1&fourk=1`
          : `https://api.bilibili.com/x/player/playurl?aid=${avid}&cid=${cid}&qn=80&fnval=1&fourk=1`;
        const r2 = await fetchWithTimeout(playApi, 8000);
        const d2 = await r2.json();
        if (d2.code === 0 && d2.data && d2.data.durl && d2.data.durl.length > 0) {
          return d2.data.durl[0].url;
        }
      }
    }
  } catch(e) {}

  // 后备：B站外链播放器
  return null;
}

// --- 小红书 ---
async function parseXiaohongshu(url) {
  try {
    const r = await fetchWithTimeout('https://tenapi.cn/v2/video?url=' + encodeURIComponent(url), 8000);
    const d = await r.json();
    if (d.code === 200 && d.data && d.data.url) return d.data.url;
  } catch(e) {}
  return null;
}

// --- YouTube ---
async function parseYoutube(url) {
  try {
    const r = await fetchWithTimeout('https://www.youtube.com/oembed?url=' + encodeURIComponent(url) + '&format=json', 8000);
    const d = await r.json();
    // oembed 只给标题，不给直链。需要第三方。
  } catch(e) {}

  // 尝试第三方解析
  try {
    const vid = extractYoutubeId(url);
    if (vid) {
      const r = await fetchWithTimeout('https://inv.nadeko.net/api/v1/videos/' + vid, 8000);
      const d = await r.json();
      if (d.formatStreams) {
        const best = d.formatStreams.filter(f => f.container === 'webm' || f.container === 'mp4').pop();
        if (best && best.url) return best.url;
      }
    }
  } catch(e) {}

  return null;
}

function extractYoutubeId(url) {
  const patterns = [
    /(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,
    /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
    /(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
  ];
  for (let p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

// --- 西瓜视频 ---
async function parseXigua(url) {
  try {
    const r = await fetchWithTimeout('https://tenapi.cn/v2/video?url=' + encodeURIComponent(url), 8000);
    const d = await r.json();
    if (d.code === 200 && d.data && d.data.url) return d.data.url;
  } catch(e) {}
  return null;
}

// ============ 通用解析 ============
async function tryOEmbed(url) {
  const providers = [
    'https://www.youtube.com/oembed?format=json&url=',
    'https://vimeo.com/api/oembed.json?url=',
  ];
  for (let base of providers) {
    try {
      const r = await fetchWithTimeout(base + encodeURIComponent(url), 6000);
      const d = await r.json();
      if (d.html) {
        const srcMatch = d.html.match(/src="([^"]+)"/);
        if (srcMatch) return { video_url: srcMatch[1], title: d.title || '' };
      }
    } catch(e) {}
  }
  return null;
}

async function tryGenericParser(url) {
  const apis = [
    'https://api.qqsuu.cn/api/dm-music/video?url=',
    'https://tenapi.cn/v2/video?url=',
  ];
  for (let base of apis) {
    try {
      const r = await fetchWithTimeout(base + encodeURIComponent(url), 8000);
      const d = await r.json();
      const u = d.data && d.data.url ? d.data.url : (d.url || null);
      if (u) return u;
    } catch(e) {}
  }
  return null;
}

function getEmbedUrl(url, platform) {
  switch (platform) {
    case 'B站': {
      const bvMatch = url.match(/BV[a-zA-Z0-9]{10}/);
      if (bvMatch) return 'https://player.bilibili.com/player.html?bvid=' + bvMatch[0] + '&autoplay=0';
      const avMatch = url.match(/av(\d+)/i);
      if (avMatch) return 'https://player.bilibili.com/player.html?aid=' + avMatch[1] + '&autoplay=0';
      return null;
    }
    case 'YouTube': {
      const vid = extractYoutubeId(url);
      if (vid) return 'https://www.youtube.com/embed/' + vid;
      return null;
    }
    default:
      return null;
  }
}

// ============ 工具函数 ============
function fetchWithTimeout(url, timeout) {
  return new Promise((resolve, reject) => {
    const controller = new AbortController();
    const timer = setTimeout(() => {
      controller.abort();
      reject(new Error('请求超时'));
    }, timeout);
    fetch(url, { signal: controller.signal })
      .then(r => { clearTimeout(timer); resolve(r); })
      .catch(e => { clearTimeout(timer); reject(e); });
  });
}

// ============ UI 逻辑 ============
function resetUI() {
  document.getElementById('playerWrapper').classList.remove('show');
  document.getElementById('actions').classList.remove('show');
  document.getElementById('videoInfo').classList.remove('show');
  document.getElementById('platformTag').classList.remove('show');
  document.getElementById('videoPlayer').src = '';
  document.getElementById('btnDownload').href = '#';
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = 'status show';
  if (type) el.classList.add(type);
}

function onSuccess(videoUrl, title, meta, platform) {
  const isEmbed = videoUrl.includes('player.bilibili.com') || videoUrl.includes('youtube.com/embed');

  if (isEmbed) {
    // 嵌入播放器不支持直接 video 标签，改用 iframe
    const wrapper = document.getElementById('playerWrapper');
    wrapper.innerHTML = `<iframe src="${videoUrl}" style="width:100%;height:50vh;border:none;border-radius:var(--radius);" allow="autoplay;fullscreen" allowfullscreen></iframe>`;
    wrapper.classList.add('show');

    // 隐藏下载按钮
    document.getElementById('btnDownload').style.display = 'none';
    document.getElementById('btnCopy').style.display = 'block';
    document.getElementById('actions').classList.add('show');
  } else {
    // 直链视频
    const player = document.getElementById('videoPlayer');
    player.src = videoUrl;
    document.getElementById('playerWrapper').classList.add('show');
    document.getElementById('btnDownload').href = videoUrl;
    document.getElementById('btnDownload').style.display = 'block';
    document.getElementById('btnCopy').style.display = 'block';
    document.getElementById('actions').classList.add('show');
  }

  if (title) {
    document.getElementById('videoTitle').textContent = title;
    document.getElementById('videoInfo').classList.add('show');
  }
  if (meta) {
    document.getElementById('videoMeta').textContent = meta;
    document.getElementById('videoInfo').classList.add('show');
  }

  showStatus('解析成功', 'success');
  setTimeout(() => { document.getElementById('status').classList.remove('show'); }, 2000);
}

function copyLink() {
  const url = document.getElementById('videoPlayer').src || document.getElementById('btnDownload').href;
  if (!url || url === '#') return;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('链接已复制'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('链接已复制');
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

// ============ 粘贴监听（自动解析） ============
document.getElementById('urlInput').addEventListener('paste', function(e) {
  // 延迟一下等粘贴内容填入
  setTimeout(() => {
    const val = this.value.trim();
    if (val && /^https?:\/\//.test(val)) {
      // 自动触发解析（可选，避免误触发可以不自动）
      // parseVideo(); 
    }
  }, 100);
});

// 回车键解析
document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    parseVideo();
  }
});

// ============ 下载文件名处理 ============
document.getElementById('btnDownload').addEventListener('click', function(e) {
  const url = this.href;
  if (!url || url === '#') {
    e.preventDefault();
    return;
  }
  // 尝试触发下载
  const a = this;
  const ext = url.match(/\.(mp4|webm|mov|mkv|flv)(\?|$)/i);
  const filename = 'video.' + (ext ? ext[1] : 'mp4');
  a.download = filename;
});
</script>
</body>
</html>
